<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRD Labs</title>
  <meta name="description" content="HRD Labs — optimization & world models">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'light';</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="page">
    <header class="masthead">
      <button class="theme-toggle" type="button" aria-label="Toggle light/dark theme"><svg class="icon-moon" width="14" height="14" viewBox="0 0 7 7" shape-rendering="crispEdges" fill="currentColor" aria-hidden="true"><rect x="2" y="0" width="3" height="1"/><rect x="1" y="1" width="2" height="1"/><rect x="0" y="2" width="2" height="3"/><rect x="1" y="5" width="2" height="1"/><rect x="2" y="6" width="3" height="1"/></svg><svg class="icon-sun" width="14" height="14" viewBox="0 0 9 9" shape-rendering="crispEdges" fill="currentColor" aria-hidden="true"><rect x="3" y="3" width="3" height="3"/><rect x="4" y="0" width="1" height="1"/><rect x="4" y="8" width="1" height="1"/><rect x="0" y="4" width="1" height="1"/><rect x="8" y="4" width="1" height="1"/><rect x="1" y="1" width="1" height="1"/><rect x="7" y="1" width="1" height="1"/><rect x="1" y="7" width="1" height="1"/><rect x="7" y="7" width="1" height="1"/></svg></button>
      <span class="masthead-cat" role="img" aria-label="HRD Labs catgirl logo"></span>
      <span class="cat-meow" aria-hidden="true"></span>
      <div class="masthead-title">
        <h1>HRD Labs</h1>
        <span class="tilde">~</span>
        <span class="cursor" aria-hidden="true"></span>
      </div>
      <p class="tagline">We study <span class="hl-optimization">optimization</span> and <span class="hl-worldmodels">world models</span>.</p>
    </header>

    <section id="research" class="research">
      <div class="prompt-line">$ ls research/ --sort=date</div>
      <a href="research/interactive-world-models/" class="post">
        <span class="post-date">2026-07-05</span>
        <span class="post-body">
          <span class="post-title">Training-free interactive video generation model</span>
        </span>
        <span class="tag tag-worldmodels">world models</span>
      </a>
    </section>

    <section id="team" class="team">
      <div class="prompt-line">$ ls team/</div>
      <a href="team.html" class="team-line">
        <span class="team-name">krabs/</span>
        <span class="team-cats" aria-hidden="true">
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13"><use href="assets/cat-sit.svg#cat"/></svg>
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13"><use href="assets/cat-sit.svg#cat"/></svg>
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13"><use href="assets/cat-sit.svg#cat"/></svg>
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13"><use href="assets/cat-sit.svg#cat"/></svg>
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13"><use href="assets/cat-sit.svg#cat"/></svg>
        </span>
        <span class="team-arrow">→</span>
      </a>
    </section>

    <section id="about" class="about">
      <div class="prompt-line">$ cat about.txt</div>
      <p>we really like compute. <svg class="about-cat" width="34" height="16" viewBox="-0.5 -0.5 17 8" aria-hidden="true"><use href="assets/cat-sleep.svg#cat"/></svg></p>
    </section>

    <footer id="contact" class="footer">
      <div class="prompt-line">$ contact</div>
      <div class="footer-links">
        <a href="mailto:wanghrd16@gmail.com">wanghrd16@gmail.com</a>
        <a href="#">x / twitter</a>
        <a href="#">rss</a>
      </div>
      <div class="copyright">© 2026 HRD Labs</div>
    </footer>
  </div>


  <script>
    document.querySelectorAll('.theme-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        document.body.dataset.theme = next;
        localStorage.setItem('theme', next);
      });
    });
  </script>
  <script>
    (() => {
      const cat = document.querySelector('.masthead-cat');
      const meow = document.querySelector('.cat-meow');
      if (!cat) return;
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const blink = (n) => {
        cat.classList.add('is-blinking');
        setTimeout(() => {
          cat.classList.remove('is-blinking');
          if (n > 1) setTimeout(() => blink(n - 1), 90);
        }, 130);
      };
      if (!reduced) {
        const loop = () => setTimeout(() => { blink(Math.random() < 0.25 ? 2 : 1); loop(); }, 2800 + Math.random() * 3800);
        loop();
      }
      const words = ['meow!', 'mrrp?', 'purrr', ':3'];
      let t;
      cat.addEventListener('click', () => {
        blink(2);
        if (!meow) return;
        meow.textContent = words[Math.floor(Math.random() * words.length)];
        meow.classList.add('show');
        clearTimeout(t);
        t = setTimeout(() => meow.classList.remove('show'), 1200);
      });
    })();
  </script>
</body>
</html>
