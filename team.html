<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRABS — HRD Labs</title>
  <meta name="description" content="HRD Labs — KRABS">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='3' y='1' width='7' height='14' fill='%23c4b28a'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'light';</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="page">
    <header class="masthead">
      <nav class="crumb"><a href="index.html">$ cd ~</a></nav>
      <button class="theme-toggle" type="button" aria-label="Toggle light/dark theme"><svg class="icon-moon" width="14" height="14" viewBox="0 0 7 7" shape-rendering="crispEdges" fill="currentColor" aria-hidden="true"><rect x="2" y="0" width="3" height="1"/><rect x="1" y="1" width="2" height="1"/><rect x="0" y="2" width="2" height="3"/><rect x="1" y="5" width="2" height="1"/><rect x="2" y="6" width="3" height="1"/></svg><svg class="icon-sun" width="14" height="14" viewBox="0 0 9 9" shape-rendering="crispEdges" fill="currentColor" aria-hidden="true"><rect x="3" y="3" width="3" height="3"/><rect x="4" y="0" width="1" height="1"/><rect x="4" y="8" width="1" height="1"/><rect x="0" y="4" width="1" height="1"/><rect x="8" y="4" width="1" height="1"/><rect x="1" y="1" width="1" height="1"/><rect x="7" y="1" width="1" height="1"/><rect x="1" y="7" width="1" height="1"/><rect x="7" y="7" width="1" height="1"/></svg></button>
      <svg class="masthead-cat" width="66" height="57" viewBox="-1 -1 22 19" role="img" aria-label="HRD Labs pixel cat"><use href="assets/pixel-cat.svg#cat"/></svg>
      <div class="masthead-title">
        <h1><a href="index.html">HRD Labs</a></h1>
        <span class="tilde">~/team</span>
        <span class="cursor" aria-hidden="true"></span>
      </div>
    </header>

    <section class="krabs">
      <div class="prompt-line">$ cat krabs.txt</div>
      <div class="crossword-grid">
        <div class="name-col">
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13" aria-hidden="true"><use href="assets/cat-sit.svg#cat"/></svg>
          <span class="letter first">K</span><span class="letter">A</span><span class="letter">I</span><span class="letter">T</span><span class="letter">L</span><span class="letter">Y</span><span class="letter">N</span>
        </div>
        <div class="name-col">
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13" aria-hidden="true"><use href="assets/cat-sit.svg#cat"/></svg>
          <span class="letter first">R</span><span class="letter">A</span><span class="letter">Y</span>
        </div>
        <div class="name-col">
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13" aria-hidden="true"><use href="assets/cat-sit.svg#cat"/></svg>
          <span class="letter first">A</span><span class="letter">L</span><span class="letter">A</span><span class="letter">N</span>
        </div>
        <div class="name-col">
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13" aria-hidden="true"><use href="assets/cat-sit.svg#cat"/></svg>
          <span class="letter first">B</span><span class="letter">R</span><span class="letter">Y</span><span class="letter">A</span><span class="letter">N</span>
        </div>
        <div class="name-col">
          <svg class="mini-cat" width="22" height="24" viewBox="-0.5 -0.5 12 13" aria-hidden="true"><use href="assets/cat-sit.svg#cat"/></svg>
          <span class="letter first">S</span><span class="letter">U</span><span class="letter">B</span><span class="letter">H</span><span class="letter">A</span>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="prompt-line">$ contact</div>
      <div class="footer-links">
        <a href="mailto:wanghrd16@gmail.com">wanghrd16@gmail.com</a>
        <a href="#">x / twitter</a>
        <a href="#">rss</a>
      </div>
      <div class="copyright">© 2026 HRD Labs</div>
    </footer>
  </div>


  <script>
    document.querySelectorAll('.theme-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        document.body.dataset.theme = next;
        localStorage.setItem('theme', next);
      });
    });
  </script>
</body>
</html>
